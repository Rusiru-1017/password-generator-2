<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Galactic Security Key Generator">
  <title>Galactic Security Key Generator</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e27;
    }

    .container {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e27;
      position: relative;
      padding: 20px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      z-index: 1;
    }

    .astronaut {
      position: absolute;
      width: 400px;  /* 400px කළා! */
      height: auto;
      left: 3%;
      top: 10%;
      z-index: 10;
      filter: drop-shadow(0 0 40px rgba(100, 200, 255, 0.8)) 
              drop-shadow(0 0 80px rgba(150, 220, 255, 0.5));
      animation: floatAstronaut 8s ease-in-out infinite;
    }

    @keyframes floatAstronaut {
      0%, 100% {
        transform: translateY(0px) rotate(0deg) translateX(0px);
      }
      25% {
        transform: translateY(-30px) rotate(3deg) translateX(10px);
      }
      50% {
        transform: translateY(-15px) rotate(0deg) translateX(0px);
      }
      75% {
        transform: translateY(-45px) rotate(-3deg) translateX(-10px);
      }
    }

    .content {
      position: relative;
      z-index: 20;
      background: rgba(45, 45, 80, 0.85);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(100, 200, 255, 0.4);
      border-radius: 20px;
      padding: 40px;
      max-width: 550px;
      box-shadow: 
        0 8px 32px rgba(0, 100, 255, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title {
      text-align: center;
      color: #64c8ff;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 30px;
      text-shadow: 0 0 15px rgba(100, 200, 255, 0.7);
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .date-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .date-field {
      flex: 1;
    }

    label {
      display: block;
      color: #a8d5ff;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(100, 200, 255, 0.4);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 15px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input:hover, select:hover {
      border-color: rgba(100, 200, 255, 0.7);
      background: rgba(255, 255, 255, 0.12);
    }

    input:focus, select:focus {
      outline: none;
      border-color: rgba(100, 200, 255, 1);
      box-shadow: 
        0 0 15px rgba(100, 200, 255, 0.4),
        inset 0 0 10px rgba(100, 200, 255, 0.2);
      background: rgba(255, 255, 255, 0.15);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    select option {
      background: #1a1f3a;
      color: #fff;
    }

    .button {
      width: 100%;
      padding: 18px;  /* ලොකු කළා! */
      background: linear-gradient(135deg, #64c8ff 0%, #4a9fff 100%);
      border: none;
      border-radius: 12px;
      color: #0a0e27;
      font-weight: bold;
      font-size: 18px;  /* ලොකු කළා! */
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 25px;
      box-shadow: 0 6px 20px rgba(100, 200, 255, 0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(100, 200, 255, 0.6);
    }

    .button:active {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(100, 200, 255, 0.4);
    }

    .result-section {
      margin-top: 30px;
      padding-top: 25px;
      border-top: 2px solid rgba(100, 200, 255, 0.3);
      animation: slideUp 0.5s ease-out;
    }

    .result-label {
      color: #a8d5ff;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .security-key {
      background: rgba(20, 30, 60, 0.9);
      border: 2px solid rgba(100, 200, 255, 0.6);
      padding: 20px;
      border-radius: 10px;
      color: #64ff64;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      word-break: break-all;
      text-align: center;
      font-weight: bold;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 0 20px rgba(100, 255, 100, 0.3),
        inset 0 0 12px rgba(100, 255, 100, 0.1);
      letter-spacing: 1.5px;
      user-select: all;
    }

    .copy-btn {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background: rgba(100, 200, 255, 0.25);
      border: 2px solid rgba(100, 200, 255, 0.5);
      color: #64c8ff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .copy-btn:hover {
      background: rgba(100, 200, 255, 0.35);
      border-color: rgba(100, 200, 255, 0.8);
      box-shadow: 0 0 12px rgba(100, 200, 255, 0.3);
    }

    @media (max-width: 768px) {
      .astronaut {
        width: 250px;
        left: 1%;
        top: 5%;
      }
      
      .content {
        padding: 30px 20px;
      }

      .title {
        font-size: 26px;
      }

      .date-group {
        flex-direction: column;
        gap: 0;
      }

      .button {
        padding: 16px;
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      .astronaut {
        width: 180px;
        left: 0%;
        top: 3%;
      }
      
      .content {
        padding: 25px 15px;
      }

      .title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <canvas id="spaceCanvas"></canvas>
  <img src="astronaut.png" alt="Floating Astronaut" class="astronaut">

  <div class="content">
    <div class="title">🚀 Galactic Security Key</div>
    
    <form id="keyForm">
      <div class="form-group">
        <label for="name">Enter your full name</label>
        <input type="text" id="name" placeholder="Your name" required>
      </div>
      
      <div class="form-group">
        <label>Date of Birth</label>
        <div class="date-group">
          <div class="date-field">
            <select id="day" required>
              <option value="">Day</option>
              ${Array.from({length: 31}, (_, i) => `<option value="${i + 1}">${i + 1}</option>`).join('')}
            </select>
          </div>
          <div class="date-field">
            <select id="month" required>
              <option value="">Month</option>
              <option value="1">January</option>
              <option value="2">February</option>
              <option value="3">March</option>
              <option value="4">April</option>
              <option value="5">May</option>
              <option value="6">June</option>
              <option value="7">July</option>
              <option value="8">August</option>
              <option value="9">September</option>
              <option value="10">October</option>
              <option value="11">November</option>
              <option value="12">December</option>
            </select>
          </div>
          <div class="date-field">
            <select id="year" required>
              <option value="">Year</option>
              ${Array.from({length: 100}, (_, i) => `<option value="${2024 - i}">${2024 - i}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>
      
      <button type="submit" class="button">Generate Secure Key</button>
      
      <div class="result-section" id="resultSection" style="display: none;">
        <div class="result-label">Your Security Key</div>
        <div class="security-key" id="securityKey">-</div>
        <button type="button" class="copy-btn" id="copyBtn">Copy to Clipboard</button>
      </div>
    </form>
  </div>
</div>

<script>
// Generate date options
const daySelect = document.getElementById('day');
const monthSelect = document.getElementById('month');
const yearSelect = document.getElementById('year');

for (let i = 1; i <= 31; i++) {
  const option = document.createElement('option');
  option.value = i;
  option.textContent = i;
  daySelect.appendChild(option);
}

for (let i = 2024; i >= 1920; i--) {
  const option = document.createElement('option');
  option.value = i;
  option.textContent = i;
  yearSelect.appendChild(option);
}

// Canvas setup
const canvas = document.getElementById('spaceCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Colorful Star class - වර්ණවත් තරු!
class Star {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.radius = Math.random() * 3 + 1.5;  // ලොකු තරු!
    this.baseOpacity = Math.random() * 0.6 + 0.4;
    this.opacity = this.baseOpacity;
    this.twinkleSpeed = Math.random() * 0.04 + 0.02;
    this.color = this.getRandomColor();
  }

  getRandomColor() {
    const colors = [
      { r: 255, g: 255, b: 255 },  // සුදු
      { r: 255, g: 240, b: 200 },  // කහ
      { r: 200, g: 220, b: 255 },  // නිල්
      { r: 255, g: 200, b: 200 },  // රෝස
      { r: 200, g: 255, b: 255 },  // cyan
      { r: 255, g: 220, b: 150 },  // තැඹිලි
      { r: 220, g: 200, b: 255 },  // දම්
    ];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  draw() {
    // තවත් ලොකු glow එකක්
    const gradient = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, this.radius * 3
    );
    
    gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity})`);
    gradient.addColorStop(0.3, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * 0.6})`);
    gradient.addColorStop(0.7, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * 0.2})`);
    gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
    ctx.fill();

    // මැද තියෙන දීප්තිමත් කොටස
    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity + 0.2})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  update() {
    this.opacity = this.baseOpacity + Math.sin(Date.now() * this.twinkleSpeed) * 0.4;
    if (this.opacity < 0.3) this.opacity = 0.3;
    if (this.opacity > 1) this.opacity = 1;
  }
}

// Shooting star
class ShootingStar {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height * 0.5;
    this.length = Math.random() * 100 + 30;
    this.speed = Math.random() * 12 + 6;
    this.angle = Math.random() * Math.PI * 0.5 + Math.PI * 0.25;
    this.opacity = 0;
    this.active = false;
    this.waitTime = Math.random() * 300 + 150;
  }

  update() {
    if (!this.active) {
      this.waitTime--;
      if (this.waitTime <= 0) {
        this.active = true;
        this.opacity = 1;
      }
    } else {
      this.x += Math.cos(this.angle) * this.speed;
      this.y += Math.sin(this.angle) * this.speed;
      this.opacity -= 0.015;

      if (this.opacity <= 0 || this.x > canvas.width || this.y > canvas.height) {
        this.reset();
      }
    }
  }

  draw() {
    if (!this.active) return;

    const endX = this.x - Math.cos(this.angle) * this.length;
    const endY = this.y - Math.sin(this.angle) * this.length;

    const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
    gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
    gradient.addColorStop(1, `rgba(255, 255, 255, 0)`);

    ctx.strokeStyle = gradient;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();
  }
}

class Nebula {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 250 + 200;
    this.opacity = Math.random() * 0.35 + 0.15;
    this.drift = Math.random() * 0.3 - 0.15;
  }

  draw() {
    const gradient = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, this.size
    );
    gradient.addColorStop(0, `rgba(255, 100, 200, ${this.opacity})`);
    gradient.addColorStop(0.5, `rgba(100, 200, 255, ${this.opacity * 0.6})`);
    gradient.addColorStop(1, `rgba(0, 100, 255, 0)`);

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }

  update() {
    this.x += this.drift;
    if (this.x < -this.size) this.x = canvas.width + this.size;
    if (this.x > canvas.width + this.size) this.x = -this.size;
  }
}

const stars = Array(350).fill().map(() => new Star());  // තවත් තරු!
const nebulas = Array(6).fill().map(() => new Nebula());
const shootingStars = Array(4).fill().map(() => new ShootingStar());

function animateSpace() {
  ctx.fillStyle = '#0a0e27';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  nebulas.forEach(nebula => {
    nebula.update();
    nebula.draw();
  });

  stars.forEach(star => {
    star.update();
    star.draw();
  });

  shootingStars.forEach(star => {
    star.update();
    star.draw();
  });

  requestAnimationFrame(animateSpace);
}

animateSpace();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Security Key Generation - දැන් day, month, year එකට!
function generateSecurityKey(name, day, month, year) {
  let hash = 0;
  const str = name + day + month + year;

  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }

  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*_-+=';
  let key = '';
  let temp = Math.abs(hash);

  for (let i = 0; i < 24; i++) {  // තවත් අකුරු!
    key += chars[temp % chars.length];
    temp = Math.floor(temp / chars.length);
  }

  return key;
}

// Form Handling
const keyForm = document.getElementById('keyForm');
const nameInput = document.getElementById('name');
const dayInput = document.getElementById('day');
const monthInput = document.getElementById('month');
const yearInput = document.getElementById('year');
const securityKeyDisplay = document.getElementById('securityKey');
const resultSection = document.getElementById('resultSection');
const copyBtn = document.getElementById('copyBtn');

keyForm.addEventListener('submit', (e) => {
  e.preventDefault();

  const name = nameInput.value.trim();
  const day = dayInput.value;
  const month = monthInput.value;
  const year = yearInput.value;

  if (!name || !day || !month || !year) {
    alert('Please fill in all fields');
    return;
  }

  const key = generateSecurityKey(name, day, month, year);
  securityKeyDisplay.textContent = key;
  resultSection.style.display = 'block';
  resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});

copyBtn.addEventListener('click', () => {
  const key = securityKeyDisplay.textContent;
  navigator.clipboard.writeText(key).then(() => {
    const originalText = copyBtn.textContent;
    copyBtn.textContent = 'Copied! ✓';
    setTimeout(() => {
      copyBtn.textContent = originalText;
    }, 2000);
  }).catch(err => {
    console.error('Failed to copy:', err);
  });
});

console.log('🚀 Galactic Security Key Generator loaded');
</script>

</body>
</html>
