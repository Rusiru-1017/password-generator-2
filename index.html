<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Galactic Security Key Generator - Create deterministic security keys with beautiful animations">
  <meta name="keywords" content="password generator, security key, hash generator, animated UI">
  <meta name="author" content="Rusiru-1017">
  <title>Galactic Security Key Generator</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e27;
    }

    .container {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e27;
      position: relative;
      padding: 20px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      z-index: 1;
    }

    .astronaut {
      position: absolute;
      width: 200px;
      height: auto;
      left: 10%;
      top: 20%;
      z-index: 10;
      filter: drop-shadow(0 0 20px rgba(100, 200, 255, 0.5));
      animation: floatAstronaut 6s ease-in-out infinite;
    }

    @keyframes floatAstronaut {
      0%, 100% {
        transform: translateY(0px) rotate(0deg);
      }
      25% {
        transform: translateY(-20px) rotate(2deg);
      }
      50% {
        transform: translateY(-10px) rotate(0deg);
      }
      75% {
        transform: translateY(-30px) rotate(-2deg);
      }
    }

    .content {
      position: relative;
      z-index: 20;
      background: rgba(45, 45, 80, 0.85);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(100, 200, 255, 0.4);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      box-shadow: 
        0 8px 32px rgba(0, 100, 255, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title {
      text-align: center;
      color: #64c8ff;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #a8d5ff;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1.5px solid rgba(100, 200, 255, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input:hover {
      border-color: rgba(100, 200, 255, 0.5);
      background: rgba(255, 255, 255, 0.08);
    }

    input:focus {
      outline: none;
      border-color: rgba(100, 200, 255, 0.8);
      box-shadow: 
        0 0 10px rgba(100, 200, 255, 0.2),
        inset 0 0 8px rgba(100, 200, 255, 0.1);
      background: rgba(255, 255, 255, 0.1);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px rgba(255, 255, 255, 0.05) inset;
      -webkit-text-fill-color: #fff;
    }

    .button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #64c8ff 0%, #4a9fff 100%);
      border: none;
      border-radius: 8px;
      color: #0a0e27;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
      box-shadow: 0 4px 15px rgba(100, 200, 255, 0.3);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(100, 200, 255, 0.5);
    }

    .button:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(100, 200, 255, 0.3);
    }

    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .result-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(100, 200, 255, 0.2);
      animation: slideUp 0.5s ease-out;
    }

    .result-label {
      color: #a8d5ff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .security-key {
      background: rgba(20, 30, 60, 0.8);
      border: 1.5px solid rgba(100, 200, 255, 0.5);
      padding: 16px;
      border-radius: 8px;
      color: #64ff64;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      word-break: break-all;
      text-align: center;
      font-weight: bold;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 0 10px rgba(100, 255, 100, 0.2),
        inset 0 0 8px rgba(100, 255, 100, 0.05);
      letter-spacing: 1px;
      user-select: all;
    }

    .copy-btn {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: rgba(100, 200, 255, 0.2);
      border: 1px solid rgba(100, 200, 255, 0.4);
      color: #64c8ff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .copy-btn:hover {
      background: rgba(100, 200, 255, 0.3);
      border-color: rgba(100, 200, 255, 0.6);
      box-shadow: 0 0 8px rgba(100, 200, 255, 0.2);
    }

    .copy-btn:active {
      transform: scale(0.98);
    }

    .copy-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .content {
        padding: 30px 20px;
        border-radius: 15px;
        max-width: 100%;
      }

      .title {
        font-size: 24px;
        margin-bottom: 25px;
      }

      input,
      .button,
      .copy-btn {
        font-size: 14px;
      }

      .astronaut {
        width: 120px;
        left: 5%;
        top: 10%;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 15px;
      }

      .content {
        padding: 25px 15px;
        border-radius: 12px;
      }

      .title {
        font-size: 20px;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        font-size: 13px;
      }

      input {
        padding: 10px 12px;
        font-size: 14px;
      }

      .button {
        padding: 12px;
        font-size: 14px;
        margin-top: 15px;
      }

      .result-section {
        margin-top: 20px;
        padding-top: 15px;
      }

      .security-key {
        font-size: 14px;
        padding: 12px;
      }

      .astronaut {
        width: 100px;
        left: 2%;
        top: 5%;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(100, 200, 255, 0.1);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(100, 200, 255, 0.3);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 200, 255, 0.5);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <canvas id="spaceCanvas"></canvas>
  
  <!-- Astronaut Image -->
  <img src="astronaut.png" alt="Floating Astronaut" class="astronaut">

  <div class="content">
    <div class="title">Galactic Security Key</div>
    
    <form id="keyForm">
      <div class="form-group">
        <label for="name">Enter your name</label>
        <input 
          type="text" 
          id="name" 
          placeholder="Your name" 
          required
          aria-label="Your name"
        >
      </div>
      
      <div class="form-group">
        <label for="birthYear">Enter birth year (e.g., 1990)</label>
        <input 
          type="number" 
          id="birthYear" 
          placeholder="Birth year" 
          min="1900" 
          max="2024" 
          required
          aria-label="Your birth year"
        >
      </div>
      
      <button type="submit" class="button">Generate Secure Key</button>
      
      <div class="result-section" id="resultSection" style="display: none;">
        <div class="result-label">Your Security Key</div>
        <div class="security-key" id="securityKey" aria-live="polite">-</div>
        <button type="button" class="copy-btn" id="copyBtn">Copy to Clipboard</button>
      </div>
    </form>
  </div>
</div>

<script>
// ============================================
// SPACE BACKGROUND ANIMATION
// ============================================

const canvas = document.getElementById('spaceCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class Star {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.radius = Math.random() * 1.5;
    this.opacity = Math.random() * 0.8 + 0.2;
    this.twinkleSpeed = Math.random() * 0.02 + 0.005;
  }

  draw() {
    ctx.fillStyle = `rgba(200, 220, 255, ${this.opacity})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  update() {
    this.opacity += this.twinkleSpeed;
    if (this.opacity > 1 || this.opacity < 0.2) {
      this.twinkleSpeed *= -1;
    }
  }
}

class Nebula {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 150 + 100;
    this.opacity = Math.random() * 0.3 + 0.05;
    this.drift = Math.random() * 0.2 - 0.1;
  }

  draw() {
    const gradient = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, this.size
    );
    gradient.addColorStop(0, `rgba(255, 100, 200, ${this.opacity})`);
    gradient.addColorStop(0.5, `rgba(100, 200, 255, ${this.opacity * 0.5})`);
    gradient.addColorStop(1, `rgba(0, 100, 255, 0)`);

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }

  update() {
    this.x += this.drift;
    if (this.x < -this.size) this.x = canvas.width + this.size;
    if (this.x > canvas.width + this.size) this.x = -this.size;
  }
}

const stars = Array(200).fill().map(() => new Star());
const nebulas = Array(5).fill().map(() => new Nebula());

function animateSpace() {
  ctx.fillStyle = '#0a0e27';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  nebulas.forEach(nebula => {
    nebula.update();
    nebula.draw();
  });

  stars.forEach(star => {
    star.update();
    star.draw();
  });

  requestAnimationFrame(animateSpace);
}

animateSpace();

// ============================================
// WINDOW RESIZE HANDLER
// ============================================

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ============================================
// SECURITY KEY GENERATION
// ============================================

function generateSecurityKey(name, birthYear) {
  let hash = 0;
  const str = name + birthYear;

  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }

  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*_-+=';

  let key = '';
  let temp = Math.abs(hash);

  for (let i = 0; i < 20; i++) {
    key += chars[temp % chars.length];
    temp = Math.floor(temp / chars.length);
  }

  return key;
}

// ============================================
// FORM HANDLING
// ============================================

const keyForm = document.getElementById('keyForm');
const nameInput = document.getElementById('name');
const birthYearInput = document.getElementById('birthYear');
const securityKeyDisplay = document.getElementById('securityKey');
const resultSection = document.getElementById('resultSection');
const copyBtn = document.getElementById('copyBtn');

keyForm.addEventListener('submit', (e) => {
  e.preventDefault();

  const name = nameInput.value.trim();
  const birthYear = birthYearInput.value;

  if (!name || !birthYear) {
    alert('Please fill in all fields');
    return;
  }

  const key = generateSecurityKey(name, birthYear);
  securityKeyDisplay.textContent = key;
  resultSection.style.display = 'block';

  resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});

copyBtn.addEventListener('click', () => {
  const key = securityKeyDisplay.textContent;

  navigator.clipboard.writeText(key).then(() => {
    const originalText = copyBtn.textContent;
    copyBtn.textContent = 'Copied! ✓';

    setTimeout(() => {
      copyBtn.textContent = originalText;
    }, 2000);
  }).catch(err => {
    console.error('Failed to copy:', err);
    alert('Failed to copy to clipboard');
  });
});

// ============================================
// ACCESSIBILITY ENHANCEMENTS
// ============================================

nameInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    birthYearInput.focus();
  }
});

birthYearInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    keyForm.dispatchEvent(new Event('submit'));
  }
});

console.log('🚀 Galactic Security Key Generator loaded successfully');
console.log('ℹ️ Enter your name and birth year to generate your unique security key');
</script>

</body>
</html>
