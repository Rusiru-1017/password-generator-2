<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Galactic Security Key Generator">
  <title>Galactic Security Key Generator</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e27;
    }

    .container {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e27;
      position: relative;
      padding: 20px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      z-index: 1;
    }

    .astronaut {
      position: absolute;
      width: 300px;  /* ලොකු කළා - 200px ඉඳන් 300px දක්වා */
      height: auto;
      left: 5%;
      top: 15%;
      z-index: 10;
      filter: drop-shadow(0 0 30px rgba(100, 200, 255, 0.7)) 
              drop-shadow(0 0 60px rgba(150, 220, 255, 0.4));
      animation: floatAstronaut 8s ease-in-out infinite;
    }

    @keyframes floatAstronaut {
      0%, 100% {
        transform: translateY(0px) rotate(0deg) translateX(0px);
      }
      25% {
        transform: translateY(-30px) rotate(3deg) translateX(10px);
      }
      50% {
        transform: translateY(-15px) rotate(0deg) translateX(0px);
      }
      75% {
        transform: translateY(-45px) rotate(-3deg) translateX(-10px);
      }
    }

    .content {
      position: relative;
      z-index: 20;
      background: rgba(45, 45, 80, 0.85);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(100, 200, 255, 0.4);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      box-shadow: 
        0 8px 32px rgba(0, 100, 255, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title {
      text-align: center;
      color: #64c8ff;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #a8d5ff;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1.5px solid rgba(100, 200, 255, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input:hover {
      border-color: rgba(100, 200, 255, 0.5);
      background: rgba(255, 255, 255, 0.08);
    }

    input:focus {
      outline: none;
      border-color: rgba(100, 200, 255, 0.8);
      box-shadow: 
        0 0 10px rgba(100, 200, 255, 0.2),
        inset 0 0 8px rgba(100, 200, 255, 0.1);
      background: rgba(255, 255, 255, 0.1);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #64c8ff 0%, #4a9fff 100%);
      border: none;
      border-radius: 8px;
      color: #0a0e27;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
      box-shadow: 0 4px 15px rgba(100, 200, 255, 0.3);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(100, 200, 255, 0.5);
    }

    .button:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(100, 200, 255, 0.3);
    }

    .result-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(100, 200, 255, 0.2);
      animation: slideUp 0.5s ease-out;
    }

    .result-label {
      color: #a8d5ff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .security-key {
      background: rgba(20, 30, 60, 0.8);
      border: 1.5px solid rgba(100, 200, 255, 0.5);
      padding: 16px;
      border-radius: 8px;
      color: #64ff64;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      word-break: break-all;
      text-align: center;
      font-weight: bold;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 0 10px rgba(100, 255, 100, 0.2),
        inset 0 0 8px rgba(100, 255, 100, 0.05);
      letter-spacing: 1px;
      user-select: all;
    }

    .copy-btn {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: rgba(100, 200, 255, 0.2);
      border: 1px solid rgba(100, 200, 255, 0.4);
      color: #64c8ff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .copy-btn:hover {
      background: rgba(100, 200, 255, 0.3);
      border-color: rgba(100, 200, 255, 0.6);
      box-shadow: 0 0 8px rgba(100, 200, 255, 0.2);
    }

    @media (max-width: 768px) {
      .astronaut {
        width: 200px;
        left: 2%;
        top: 8%;
      }
      
      .content {
        padding: 30px 20px;
      }

      .title {
        font-size: 24px;
      }
    }

    @media (max-width: 480px) {
      .astronaut {
        width: 150px;
        left: 1%;
        top: 5%;
      }
      
      .content {
        padding: 25px 15px;
      }

      .title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <canvas id="spaceCanvas"></canvas>
  <img src="astronaut.png" alt="Floating Astronaut" class="astronaut">

  <div class="content">
    <div class="title">Galactic Security Key</div>
    
    <form id="keyForm">
      <div class="form-group">
        <label for="name">Enter your name</label>
        <input type="text" id="name" placeholder="Your name" required>
      </div>
      
      <div class="form-group">
        <label for="birthYear">Enter birth year (e.g., 1990)</label>
        <input type="number" id="birthYear" placeholder="Birth year" min="1900" max="2024" required>
      </div>
      
      <button type="submit" class="button">Generate Secure Key</button>
      
      <div class="result-section" id="resultSection" style="display: none;">
        <div class="result-label">Your Security Key</div>
        <div class="security-key" id="securityKey">-</div>
        <button type="button" class="copy-btn" id="copyBtn">Copy to Clipboard</button>
      </div>
    </form>
  </div>
</div>

<script>
const canvas = document.getElementById('spaceCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Star class - වැඩියෙන් shine වෙන්න
class Star {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.radius = Math.random() * 2 + 0.5;  // තරමක් ලොකු ප්‍රමාණ
    this.baseOpacity = Math.random() * 0.5 + 0.5;  // වැඩි brightness
    this.opacity = this.baseOpacity;
    this.twinkleSpeed = Math.random() * 0.05 + 0.02;  // වේගවත් twinkle
    this.color = this.getRandomStarColor();  // වර්ණවත් තරු
  }

  getRandomStarColor() {
    const colors = [
      { r: 255, g: 255, b: 255 },  // සුදු
      { r: 200, g: 220, b: 255 },  // නිල්
      { r: 255, g: 240, b: 200 },  // කහ
      { r: 255, g: 200, b: 200 },  // රතු පැහැ
      { r: 200, g: 255, b: 255 }   // cyan
    ];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  draw() {
    // තවත් shine effect එකක්
    const gradient = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, this.radius * 2
    );
    
    gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity})`);
    gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * 0.5})`);
    gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
    ctx.fill();

    // මැද තියෙන දීප්තිමත් කොටස
    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  update() {
    // වේගවත් හා වැඩි twinkle effect
    this.opacity = this.baseOpacity + Math.sin(Date.now() * this.twinkleSpeed) * 0.4;
    
    if (this.opacity < 0.3) this.opacity = 0.3;
    if (this.opacity > 1) this.opacity = 1;
  }
}

// Shooting star class - තවත් අලුත් effect එකක්
class ShootingStar {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height * 0.5;
    this.length = Math.random() * 80 + 20;
    this.speed = Math.random() * 10 + 5;
    this.angle = Math.random() * Math.PI * 0.5 + Math.PI * 0.25;
    this.opacity = 0;
    this.active = false;
    this.waitTime = Math.random() * 200 + 100;
  }

  update() {
    if (!this.active) {
      this.waitTime--;
      if (this.waitTime <= 0) {
        this.active = true;
        this.opacity = 1;
      }
    } else {
      this.x += Math.cos(this.angle) * this.speed;
      this.y += Math.sin(this.angle) * this.speed;
      this.opacity -= 0.02;

      if (this.opacity <= 0 || this.x > canvas.width || this.y > canvas.height) {
        this.reset();
      }
    }
  }

  draw() {
    if (!this.active) return;

    const endX = this.x - Math.cos(this.angle) * this.length;
    const endY = this.y - Math.sin(this.angle) * this.length;

    const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
    gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
    gradient.addColorStop(1, `rgba(255, 255, 255, 0)`);

    ctx.strokeStyle = gradient;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();
  }
}

class Nebula {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 200 + 150;
    this.opacity = Math.random() * 0.3 + 0.1;
    this.drift = Math.random() * 0.3 - 0.15;
  }

  draw() {
    const gradient = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, this.size
    );
    gradient.addColorStop(0, `rgba(255, 100, 200, ${this.opacity})`);
    gradient.addColorStop(0.5, `rgba(100, 200, 255, ${this.opacity * 0.5})`);
    gradient.addColorStop(1, `rgba(0, 100, 255, 0)`);

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }

  update() {
    this.x += this.drift;
    if (this.x < -this.size) this.x = canvas.width + this.size;
    if (this.x > canvas.width + this.size) this.x = -this.size;
  }
}

const stars = Array(300).fill().map(() => new Star());  // තරු ගාණ වැඩි කළා
const nebulas = Array(5).fill().map(() => new Nebula());
const shootingStars = Array(3).fill().map(() => new ShootingStar());

function animateSpace() {
  ctx.fillStyle = '#0a0e27';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  nebulas.forEach(nebula => {
    nebula.update();
    nebula.draw();
  });

  stars.forEach(star => {
    star.update();
    star.draw();
  });

  shootingStars.forEach(star => {
    star.update();
    star.draw();
  });

  requestAnimationFrame(animateSpace);
}

animateSpace();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Security Key Generation
function generateSecurityKey(name, birthYear) {
  let hash = 0;
  const str = name + birthYear;

  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }

  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*_-+=';
  let key = '';
  let temp = Math.abs(hash);

  for (let i = 0; i < 20; i++) {
    key += chars[temp % chars.length];
    temp = Math.floor(temp / chars.length);
  }

  return key;
}

// Form Handling
const keyForm = document.getElementById('keyForm');
const nameInput = document.getElementById('name');
const birthYearInput = document.getElementById('birthYear');
const securityKeyDisplay = document.getElementById('securityKey');
const resultSection = document.getElementById('resultSection');
const copyBtn = document.getElementById('copyBtn');

keyForm.addEventListener('submit', (e) => {
  e.preventDefault();

  const name = nameInput.value.trim();
  const birthYear = birthYearInput.value;

  if (!name || !birthYear) {
    alert('Please fill in all fields');
    return;
  }

  const key = generateSecurityKey(name, birthYear);
  securityKeyDisplay.textContent = key;
  resultSection.style.display = 'block';
  resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});

copyBtn.addEventListener('click', () => {
  const key = securityKeyDisplay.textContent;
  navigator.clipboard.writeText(key).then(() => {
    const originalText = copyBtn.textContent;
    copyBtn.textContent = 'Copied! ✓';
    setTimeout(() => {
      copyBtn.textContent = originalText;
    }, 2000);
  }).catch(err => {
    console.error('Failed to copy:', err);
  });
});

console.log('🚀 Galactic Security Key Generator loaded');
</script>

</body>
</html>
