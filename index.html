<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Galactic Security Key Generator">
  <title>Galactic Security Key Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <canvas id="spaceCanvas"></canvas>
  <img src="astronaut.png" alt="Floating Astronaut" class="astronaut">

  <div class="content">
    <div class="title">Galactic Security Key</div>
    
    <form id="keyForm">
      <div class="form-group">
        <label for="name">Enter your full name</label>
        <input type="text" id="name" placeholder="Your name" required>
      </div>
      
      <div class="form-group">
        <label>Date of Birth</label>
        <div class="date-group">
          <div class="date-field">
            <select id="day" required>
              <option value="">Day</option>
            </select>
          </div>
          <div class="date-field">
            <select id="month" required>
              <option value="">Month</option>
              <option value="1">January</option>
              <option value="2">February</option>
              <option value="3">March</option>
              <option value="4">April</option>
              <option value="5">May</option>
              <option value="6">June</option>
              <option value="7">July</option>
              <option value="8">August</option>
              <option value="9">September</option>
              <option value="10">October</option>
              <option value="11">November</option>
              <option value="12">December</option>
            </select>
          </div>
          <div class="date-field">
            <select id="year" required>
              <option value="">Year</option>
            </select>
          </div>
        </div>
      </div>
      
      <button type="submit" class="button">Generate Secure Key</button>
      
      <div class="result-section" id="resultSection" style="display: none;">
        <div class="result-label">Your Security Key</div>
        <div class="security-key" id="securityKey">-</div>
        <button type="button" class="copy-btn" id="copyBtn">Copy to Clipboard</button>
      </div>
    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
